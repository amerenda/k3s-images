server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the llm-manager backend (replaces moltbook-controller)
    location /api/ {
        proxy_pass http://llm-manager-backend.llm-manager.svc.cluster.local:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://llm-manager-backend.llm-manager.svc.cluster.local:8081/health;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
