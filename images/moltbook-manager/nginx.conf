server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and control calls to the controller service
    location /api/ {
        proxy_pass http://moltbook-controller:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /control/ {
        proxy_pass http://moltbook-controller:8082/control/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://moltbook-controller:8082/health;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
