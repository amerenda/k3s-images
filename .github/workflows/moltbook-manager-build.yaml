name: Build and Push moltbook-manager

on:
  push:
    branches: [main]
    paths:
      - 'images/moltbook-manager/**'
      - 'images/moltbook-controller/**'
      - '.github/workflows/moltbook-manager-build.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'images/moltbook-manager/**'
      - 'images/moltbook-controller/**'
      - '.github/workflows/moltbook-manager-build.yaml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE: amerenda/k3s-images
  CONTROLLER_IMAGE: amerenda/k3s-images

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout k3s-images
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./images/moltbook-manager
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:moltbook-manager-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:moltbook-manager-latest
          cache-from: type=gha,scope=moltbook-manager
          cache-to: type=gha,mode=max,scope=moltbook-manager

      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: ./images/moltbook-controller
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.CONTROLLER_IMAGE }}:moltbook-controller-${{ github.sha }}
            ${{ env.CONTROLLER_IMAGE }}:moltbook-controller-latest
          cache-from: type=gha,scope=moltbook-controller
          cache-to: type=gha,mode=max,scope=moltbook-controller

      - name: Update image tags in amerenda-k3s
        if: github.event_name != 'pull_request'
        env:
          DEPLOY_PAT: ${{ secrets.AMERENDA_K3S_DEPLOY_PAT }}
          SHA: ${{ github.sha }}
        run: |
          git clone https://x-access-token:${DEPLOY_PAT}@github.com/amerenda/amerenda-k3s.git /tmp/amerenda-k3s
          cd /tmp/amerenda-k3s

          sed -i "s|amerenda/k3s-images:moltbook-manager-[a-f0-9]*|amerenda/k3s-images:moltbook-manager-${SHA}|g" \
            gitops/apps/moltbook-manager/deployment-frontend.yaml

          sed -i "s|amerenda/k3s-images:moltbook-controller-[a-f0-9]*|amerenda/k3s-images:moltbook-controller-${SHA}|g" \
            gitops/apps/moltbook-manager/deployment-controller.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/moltbook-manager/
          git diff --cached --quiet || git commit -m "ci: update moltbook-manager to ${SHA}"
          git push
